            Botanist: [ 1, 1 ]
            Chef: [ 1, 1 ]
            Janitor: [ 1, 1 ]
            ServiceWorker: [ 1, 1 ]
            #engineering (3)
            AtmosphericTechnician: [ 1, 1 ]
